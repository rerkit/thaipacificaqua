<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TPA Admin — จัดการกิจกรรม</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700;800&family=Kanit:wght@600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Sarabun',sans-serif;background:#f0f2f7;color:#1a2038;min-height:100vh;}

/* ── LOGIN SCREEN ── */
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#0d1b3e,#1a2d5a);}
.login-box{background:#fff;border-radius:16px;padding:40px 36px;width:100%;max-width:380px;box-shadow:0 20px 60px rgba(0,0,0,.3);}
.login-logo{text-align:center;margin-bottom:28px;}
.login-logo .brand{font-family:'Kanit',sans-serif;font-size:18px;font-weight:800;color:#0d1b3e;}
.login-logo .brand span{color:#1e90d4;}
.login-logo p{font-size:12px;color:#8898b8;margin-top:4px;}
.login-box h2{font-family:'Kanit',sans-serif;font-size:16px;font-weight:700;color:#0d1b3e;margin-bottom:20px;text-align:center;}
.lf{margin-bottom:14px;}
.lf label{display:block;font-size:11px;font-weight:700;color:#5a6a8a;margin-bottom:5px;letter-spacing:.5px;text-transform:uppercase;}
.lf input{width:100%;background:#f8fafc;border:1px solid #e8edf5;border-radius:8px;padding:12px 14px;color:#1a2038;font-size:14px;font-family:'Sarabun',sans-serif;outline:none;transition:.15s;}
.lf input:focus{border-color:#1e90d4;}
.login-btn{width:100%;background:#0d1b3e;border:none;border-radius:8px;padding:13px;color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:'Sarabun',sans-serif;transition:.15s;margin-top:6px;}
.login-btn:hover{background:#1a2d5a;}
.login-error{background:#fef2f2;border:1px solid #fca5a5;border-radius:7px;padding:10px 14px;font-size:13px;color:#dc2626;margin-bottom:14px;display:none;text-align:center;}
.login-error.show{display:block;}

/* ── ADMIN PANEL ── */
.admin-wrap{display:none;}
.admin-nav{background:#0d1b3e;padding:0 32px;height:56px;display:flex;align-items:center;justify-content:space-between;}
.admin-nav .brand{font-family:'Kanit',sans-serif;font-size:15px;font-weight:700;color:#fff;}
.admin-nav .brand span{color:#3aaee8;}
.admin-nav-right{display:flex;align-items:center;gap:16px;}
.admin-nav a{color:rgba(255,255,255,.6);font-size:13px;text-decoration:none;}
.admin-nav a:hover{color:#fff;}
.logout-btn{background:rgba(239,68,68,.2);border:1px solid rgba(239,68,68,.3);color:#f87171;border-radius:6px;padding:5px 12px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Sarabun',sans-serif;transition:.15s;}
.logout-btn:hover{background:rgba(239,68,68,.35);}
.container{max-width:900px;margin:0 auto;padding:36px 24px 80px;}
h1{font-family:'Kanit',sans-serif;font-size:22px;font-weight:800;color:#0d1b3e;margin-bottom:4px;}
.subtitle{font-size:13px;color:#8898b8;margin-bottom:28px;}
.card{background:#fff;border:1px solid #e8edf5;border-radius:12px;padding:28px;margin-bottom:24px;}
.card h2{font-family:'Kanit',sans-serif;font-size:16px;font-weight:700;color:#0d1b3e;margin-bottom:18px;display:flex;align-items:center;gap:8px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
.form-row.full{grid-template-columns:1fr;}
.fg label{display:block;font-size:11px;font-weight:700;color:#5a6a8a;margin-bottom:5px;letter-spacing:.5px;text-transform:uppercase;}
.fg input,.fg textarea,.fg select{width:100%;background:#f8fafc;border:1px solid #e8edf5;border-radius:7px;padding:10px 13px;color:#1a2038;font-size:13px;font-family:'Sarabun',sans-serif;outline:none;transition:.15s;}
.fg input:focus,.fg textarea:focus,.fg select:focus{border-color:#1e90d4;}
.fg textarea{resize:vertical;min-height:72px;}
.fg select option{background:#fff;}
.img-label{display:flex;align-items:center;justify-content:center;gap:7px;width:100%;background:#f8fafc;border:1px dashed #c8d4e8;border-radius:7px;padding:12px;cursor:pointer;color:#8898b8;font-size:13px;transition:.15s;}
.img-label:hover{border-color:#1e90d4;color:#1e90d4;}
#aPrev{width:100%;max-height:100px;object-fit:cover;border-radius:7px;display:none;margin-top:8px;}
.btn-add{background:#0d1b3e;border:none;border-radius:8px;padding:12px 28px;color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:'Sarabun',sans-serif;transition:.15s;margin-top:4px;}
.btn-add:hover{background:#1a2d5a;}
.act-row{display:flex;align-items:center;gap:14px;background:#f8fafc;border:1px solid #e8edf5;border-radius:9px;padding:14px;margin-bottom:10px;}
.act-row-thumb{width:64px;height:64px;border-radius:8px;background:#e8edf5;display:flex;align-items:center;justify-content:center;font-size:28px;flex-shrink:0;overflow:hidden;position:relative;}
.act-row-thumb img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
.act-row-info{flex:1;min-width:0;}
.act-row-meta{display:flex;align-items:center;gap:8px;margin-bottom:4px;}
.atag{font-size:10px;font-weight:700;padding:2px 8px;border-radius:3px;}
.t-new{background:rgba(232,160,32,.15);color:#d4860a;}
.t-ev{background:rgba(30,144,212,.12);color:#1e90d4;}
.t-st{background:rgba(16,185,129,.12);color:#059669;}
.adate{font-size:11px;color:#8898b8;}
.act-row-title{font-size:14px;font-weight:700;color:#0d1b3e;}
.act-row-title-en{font-size:12px;color:#8898b8;}
.del-btn{background:#fff;border:1px solid #fca5a5;color:#ef4444;border-radius:6px;padding:7px 13px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Sarabun',sans-serif;transition:.15s;flex-shrink:0;}
.del-btn:hover{background:#fef2f2;}
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(10px);background:#0d1b3e;color:#fff;padding:12px 24px;border-radius:8px;font-size:14px;font-weight:600;opacity:0;transition:.3s;pointer-events:none;z-index:999;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<!-- ── LOGIN SCREEN ── -->
<div class="login-wrap" id="loginWrap">
  <div class="login-box">
    <div class="login-logo">
      <div class="brand">THAI <span>PACIFIC</span> AQUACULTURE</div>
      <p>Admin Panel · จัดการกิจกรรม</p>
    </div>
    <h2>🔐 เข้าสู่ระบบ</h2>
    <div class="login-error" id="loginError">Username หรือ Password ไม่ถูกต้อง</div>
    <div class="lf">
      <label>Username</label>
      <input type="text" id="loginUser" placeholder="กรอก username" autocomplete="username">
    </div>
    <div class="lf">
      <label>Password</label>
      <input type="password" id="loginPass" placeholder="กรอก password" autocomplete="current-password"
        onkeydown="if(event.key==='Enter') doLogin()"  >
    </div>
    <button class="login-btn" onclick="doLogin()">เข้าสู่ระบบ</button>
  </div>
</div>

<!-- ── ADMIN PANEL ── -->
<div class="admin-wrap" id="adminWrap">
  <div class="admin-nav">
    <div class="brand">TPA <span>Admin</span> · จัดการกิจกรรม</div>
    <div class="admin-nav-right">
      <a href="../index.html">← กลับหน้าเว็บ</a>
      <button class="logout-btn" onclick="doLogout()">ออกจากระบบ</button>
    </div>
  </div>

  <div class="container">
    <h1>จัดการกิจกรรมและข่าวสาร</h1>
    <p class="subtitle">เพิ่ม / ลบ กิจกรรมที่แสดงบนหน้าแรกของเว็บไซต์</p>

    <div class="card">
      <h2>➕ เพิ่มกิจกรรมใหม่</h2>
      <div class="form-row">
        <div class="fg">
          <label>ประเภท</label>
          <select id="aTag">
            <option value="t-new">🆕 ข่าวใหม่</option>
            <option value="t-ev">📅 กิจกรรม</option>
            <option value="t-st">✅ สต็อกสินค้า</option>
          </select>
        </div>
        <div class="fg"><label>วันที่</label><input type="date" id="aDate"></div>
      </div>
      <div class="form-row full"><div class="fg"><label>หัวข้อ (ภาษาไทย)</label><input type="text" id="aTh" placeholder="เช่น กุ้งขาวแวนนาไม PL12 พร้อมจำหน่าย"></div></div>
      <div class="form-row full"><div class="fg"><label>Title (English)</label><input type="text" id="aEn" placeholder="e.g. Whiteleg PL12 Ready for Delivery"></div></div>
      <div class="form-row full"><div class="fg"><label>รายละเอียด (ภาษาไทย)</label><textarea id="aDTh" placeholder="รายละเอียดเพิ่มเติม..."></textarea></div></div>
      <div class="form-row full"><div class="fg"><label>Description (English)</label><textarea id="aDEn" placeholder="Additional details..."></textarea></div></div>
      <div class="form-row">
        <div class="fg">
          <label>รูปภาพ</label>
          <label class="img-label" for="aFile">📷 อัพโหลดรูป (JPG/PNG)</label>
          <input type="file" id="aFile" accept="image/*" style="display:none" onchange="prevImg(this)">
          <img id="aPrev">
        </div>
        <div class="fg"><label>หรือใส่ Emoji</label><input type="text" id="aEmoji" placeholder="🦐 🌊 🎉 📜"></div>
      </div>
      <button class="btn-add" onclick="addAct()">✅ เพิ่มกิจกรรม</button>
    </div>

    <div class="card">
      <h2>📋 กิจกรรมทั้งหมด</h2>
      <div id="actList"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── Credentials (SHA-256 hashed — ไม่เก็บ password จริง) ──
var ADMIN_USER_HASH = 'cd743b896b492137ee5c51b46dd864d8d2c88a731a1fc25cc952ef4f24e8ff81';
var ADMIN_PASS_HASH = '6046a14912e589721d4aa36f9776302435e36294dc994557f48e2faa4ba86ca8';
var SALT = 'tpa_salt_9x2k';
var SESSION_KEY = 'tpa_admin_auth';

async function sha256(str) {
  var buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(function(b){return b.toString(16).padStart(2,'0');}).join('');
}

async function doLogin() {
  var u = document.getElementById('loginUser').value.trim();
  var p = document.getElementById('loginPass').value;
  var uHash = await sha256(SALT + u);
  var pHash = await sha256(SALT + p);
  if (uHash === ADMIN_USER_HASH && pHash === ADMIN_PASS_HASH) {
    sessionStorage.setItem(SESSION_KEY, '1');
    document.getElementById('loginWrap').style.display = 'none';
    document.getElementById('adminWrap').style.display = 'block';
    loadData(); renderAdmin();
    var d = document.getElementById('aDate');
    if (d) d.value = new Date().toISOString().slice(0,10);
  } else {
    document.getElementById('loginError').classList.add('show');
    document.getElementById('loginPass').value = '';
  }
}

function doLogout() {
  sessionStorage.removeItem(SESSION_KEY);
  document.getElementById('adminWrap').style.display = 'none';
  document.getElementById('loginWrap').style.display = 'flex';
  document.getElementById('loginUser').value = '';
  document.getElementById('loginPass').value = '';
  document.getElementById('loginError').classList.remove('show');
}

// Check session on load
window.addEventListener('DOMContentLoaded', function() {
  if (sessionStorage.getItem(SESSION_KEY) === '1') {
    document.getElementById('loginWrap').style.display = 'none';
    document.getElementById('adminWrap').style.display = 'block';
    loadData(); renderAdmin();
    var d = document.getElementById('aDate');
    if (d) d.value = new Date().toISOString().slice(0,10);
  }
});

// ── Activity Data ──
var SK = 'tpa_activities';
var data = [];
var TMAP = {'t-new':'🆕','t-ev':'📅','t-st':'✅'};
var TLTH = {'t-new':'ใหม่','t-ev':'กิจกรรม','t-st':'สต็อก'};

function loadData() { var s=localStorage.getItem(SK); data=s?JSON.parse(s):[]; }
function saveData() { localStorage.setItem(SK,JSON.stringify(data)); }

function fmtDate(s) {
  if (!s) return '';
  var d=new Date(s), m=['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
  return d.getDate()+' '+m[d.getMonth()]+' '+(d.getFullYear()+543);
}

function renderAdmin() {
  var el=document.getElementById('actList');
  if (!el) return;
  if (data.length===0) { el.innerHTML='<p style="color:#888;text-align:center;padding:24px">ยังไม่มีกิจกรรม</p>'; return; }
  el.innerHTML='';
  data.slice().reverse().forEach(function(a) {
    var row=document.createElement('div'); row.className='act-row';
    row.innerHTML=
      '<div class="act-row-thumb">'+(a.img?'<img src="'+a.img+'">':(a.emoji||'📸'))+'</div>'+
      '<div class="act-row-info">'+
        '<div class="act-row-meta">'+
          '<span class="atag '+a.tag+'">'+(TMAP[a.tag]||'')+' '+(TLTH[a.tag]||'')+'</span>'+
          '<span class="adate">'+fmtDate(a.date)+'</span>'+
        '</div>'+
        '<div class="act-row-title">'+a.th+'</div>'+
        '<div class="act-row-title-en">'+a.en+'</div>'+
      '</div>'+
      '<button class="del-btn" onclick="delAct('+a.id+')">🗑 ลบ</button>';
    el.appendChild(row);
  });
}

function delAct(id) {
  if (!confirm('ลบกิจกรรมนี้?')) return;
  data=data.filter(function(a){return a.id!==id;});
  saveData(); renderAdmin(); showToast('ลบเรียบร้อยแล้ว');
}

var pendImg=null;
function prevImg(inp) {
  var f=inp.files[0]; if (!f) return;
  var r=new FileReader();
  r.onload=function(e){pendImg=e.target.result;var p=document.getElementById('aPrev');p.src=pendImg;p.style.display='block';};
  r.readAsDataURL(f);
}

function addAct() {
  var tth=document.getElementById('aTh').value.trim();
  var ten=document.getElementById('aEn').value.trim();
  if (!tth&&!ten){alert('กรุณาใส่หัวข้อ');return;}
  data.push({id:Date.now(),tag:document.getElementById('aTag').value,date:document.getElementById('aDate').value||new Date().toISOString().slice(0,10),th:tth||ten,en:ten||tth,dth:document.getElementById('aDTh').value,den:document.getElementById('aDEn').value,emoji:document.getElementById('aEmoji').value||'📸',img:pendImg||null});
  saveData(); renderAdmin();
  ['aTh','aEn','aDTh','aDEn','aEmoji'].forEach(function(id){document.getElementById(id).value='';});
  document.getElementById('aFile').value='';
  document.getElementById('aPrev').style.display='none';
  pendImg=null;
  showToast('เพิ่มกิจกรรมเรียบร้อยแล้ว ✅');
}

function showToast(msg) {
  var t=document.getElementById('toast'); if (!t) return;
  t.textContent=msg; t.classList.add('show');
  setTimeout(function(){t.classList.remove('show');},2500);
}
</script>
</body>
</html>
